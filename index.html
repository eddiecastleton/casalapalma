body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--brown);min-height:100vh}

.hsub{color:#D0B896;font-size:12px;margin-top:4px}

.pill-val{font-size:12px;color:#fff;font-weight:700}
.ro-bar{background:#111;padding:7px 30px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}

.ro-info{font-size:10px;color:#555}

.slbl{font-size:10px;color:var(--tan);margin-top:3px;text-transform:uppercase;letter-spacing:.07em}
table{width:100%;border-collapse:collapse;font-size:12px}

.thd th{background:var(--brown);color:#E8D5B0;border:none}

.pb{background:#EEE;border-radius:99px;overflow:hidden}
.pbf{border-radius:99px}
.wfr{display:flex;align-items:center;gap:11px;margin-bottom:12px}

.wfbf{height:9px;border-radius:99px}
.wfv{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;flex:0 0 90px;text-align:right}

.csl{font-size:9px;color:var(--tan);text-transform:uppercase;letter-spacing:.05em}

.aalert{background:#FFF8E1;border:1px solid #FFD54F;border-radius:7px;padding:10px 14px;font-size:11px;color:#5D3A00;margin:8px 0}

.galert{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:8px;padding:9px 15px;font-size:11px;color:#1B5E20;margin-bottom:14px}
.footer{background:var(--dark);padding:11px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-top:24px}
.gantt-row{display:flex;align-items:center;min-height:38px;border-bottom:1px solid #f5f3f0}
.gantt-label{width:145px;flex-shrink:0;padding-right:8px}
.gantt-area{flex:1;position:relative;height:38px}
.gantt-bar{position:absolute;height:26px;border-radius:4px;display:flex;align-items:center;padding-left:8px;box-shadow:0 1px 5px rgba(0,0,0,.2)}

</head>

function t(s){return isES&&TR[s]?TR[s]:s;}

function toggleLang(){

  document.getElementById('es-label').textContent=isES?TR['Dashboard for site team — La Palma, Panama']:'Dashboard for site team — La Palma, Panama';
  RA();

function nv(v){return parseFloat(String(v||0).replace(/[^0-9.-]/g,''))||0;}
function fm(v){return 'B/. '+nv(v).toLocaleString();}
function pc(p,t){return t>0?Math.min(100,Math.round(nv(p)/nv(t)*100)):0;}

function ST(id,btn){
  document.querySelectorAll('.tc').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active');});
  document.getElementById('tab-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
}

function sbCol(s){return s==='active'||s==='activo'?{bg:'#FFF3E0',fg:'#E65100'}:s==='complete'||s==='completado'||s==='done'||s==='hecho'||s==='PAID'||s==='PAGADO'?{bg:'#E8F5E9',fg:'#2E7D32'}:{bg:'#F5F5F5',fg:'#7B6654'};}

function RO(){
  var cfg=D.cfg,total=nv(cfg.TotalBudget)||50000;
  var order=D.cfgOrder||Object.keys(cfg);
  var stats=order.map(function(k){
    var c=D.cfgC[k]||'#888',l=t(D.cfgL[k]||k);
    return '<div class="sc" style="border-top:4px solid '+c+'">'+
      '<div class="sval" style="color:'+c+'">B/. '+nv(cfg[k]).toLocaleString()+'</div>'+
      '<div class="slbl">'+l+'</div></div>';
  }).join('');

  var mIco={done:'✓',active:'↻',pending:'⏳',hecho:'✓',activo:'↻',pendiente:'⏳'};
  var mls=D.milestones.map(function(m){
    var st=t(m.status);
    var mc={done:{bg:'#E8F5E9',fg:'#2E7D32'},hecho:{bg:'#E8F5E9',fg:'#2E7D32'},active:{bg:'#FFF3E0',fg:'#E65100'},activo:{bg:'#FFF3E0',fg:'#E65100'},pending:{bg:'#F5F5F5',fg:'#7B6654'},pendiente:{bg:'#F5F5F5',fg:'#7B6654'}}[st]||{bg:'#F5F5F5',fg:'#7B6654'};

      '<td style="color:var(--gold);font-size:10px;font-weight:700;width:68px">'+m.date+'</td>'+

      '<td><span class="badge" style="background:'+mc.bg+';color:'+mc.fg+'">'+st+'</span></td></tr>';
  }).join('');

  var wfRows=D.wfKeys.map(function(k,i){
    var l=t(D.wfLabels[i]),c=D.wfColors[i],v=nv(cfg[k]),p=Math.round(v/total*100);
    var s=i===0?'':'-';
    return '<div class="wfr">'+
      '<div class="wfl">'+l+'</div>'+
      '<div class="wfb"><div class="wfbf" style="width:'+Math.min(p,100)+'%;background:'+c+'"></div></div>'+
      '<div class="wfv" style="color:'+c+'">'+s+'B/.'+v.toLocaleString()+'</div></div>';
  }).join('');

  var doors=D.doors.map(function(d){
    var sc=sbCol(t(d.status||'pending'));
    return '<div style="display:flex;gap:8px;margin-bottom:13px;align-items:flex-start">'+
      '<div style="width:11px;height:11px;border-radius:50%;background:'+d.color+';flex-shrink:0;margin-top:3px"></div>'+
      '<div style="flex:1"><div style="font-weight:700;font-size:12px">'+d.title+'</div>'+
      '<div style="font-size:11px;color:var(--tan);line-height:1.5;margin-top:2px">'+d.desc+'</div></div>'+
      '<span class="badge" style="background:'+sc.bg+';color:'+sc.fg+'">'+t(d.status||'pending')+'</span></div>';
  }).join('');

  var hols=D.holidays.map(function(h){
    return '<div style="display:flex;gap:8px;margin-bottom:12px;align-items:flex-start">'+
      '<span style="font-size:18px;flex-shrink:0">'+h.icon+'</span>'+
      '<div><div style="font-weight:700;font-size:12px">'+h.title+'</div>'+
      '<div style="font-size:11px;color:var(--tan);line-height:1.5;margin-top:2px">'+h.desc+'</div></div></div>';
  }).join('');

  // Budget overview table
  var phases=D.phases,tasks=D.tasks;
  var grandBudget=0,grandPaid=0;
  var phRows=phases.map(function(ph){
    var pTasks=tasks.filter(function(tk){return tk.pid===ph.id;});
    var tBudget=pTasks.reduce(function(s,tk){return s+nv(tk.cost);},0);
    var tPaid=pTasks.reduce(function(s,tk){return s+nv(tk.paid);},0);
    var tBal=tBudget-tPaid;
    var pDone=pTasks.filter(function(tk){return tk.status==='complete';}).length;
    var pAct=pTasks.filter(function(tk){return tk.status==='active';}).length;
    var phStatus=pTasks.length>0&&pDone===pTasks.length?'complete':pAct>0?'active':'pending';
    var sc=sbCol(t(phStatus));

      '<td style="padding:8px 10px;font-weight:700;font-size:12px;color:'+ph.color+'">'+ph.lbl+': '+ph.title+'</td>'+
      '<td style="padding:8px 10px;text-align:center"><span class="badge" style="background:'+sc.bg+';color:'+sc.fg+'">'+t(phStatus)+'</span></td>'+
      '<td style="padding:8px 10px;font-size:11px;color:var(--tan)">'+pTasks.length+' tasks &bull; '+pDone+' done</td>'+
      '<td style="padding:8px 10px;font-weight:700;font-size:12px;text-align:right">'+fm(tBudget)+'</td>'+
      '<td style="padding:8px 10px;font-weight:700;font-size:12px;color:#2E7D32;text-align:right">'+fm(tPaid)+'</td>'+
      '<td style="padding:8px 10px;font-weight:700;font-size:12px;color:'+(tBal2>0?'#E65100':'#2E7D32')+';text-align:right">'+fm(tBal2)+'</td></tr>';
  }).join('');
  var grandBal=grandBudget-grandPaid;

  document.getElementById('tab-overview').innerHTML=
    '<div class="gst">'+stats+'</div>'+
    '<div class="g2">'+
    '<div class="card"><div class="ctitle">'+t('Key Milestones')+'</div><table><tbody>'+mls+'</tbody></table></div>'+
    '<div class="card"><div class="ctitle">'+t('Budget Snapshot')+'</div>'+wfRows+
    '<div style="border-top:2px solid #2E7D32;padding-top:10px;margin-top:4px;display:flex;justify-content:space-between;align-items:center">'+
    '<div style="font-weight:700;font-size:12px">'+t('NET FOR CONSTRUCTION')+'</div>'+
    '<div style="font-family:\'Playfair Display\',serif;font-size:20px;font-weight:700;color:#2E7D32">B/. '+nv(cfg.NetConstruction).toLocaleString()+'</div></div></div></div>'+
    '<div class="g2">'+
    '<div class="card"><div class="ctitle">'+t('New Doors v15 Plan')+'</div>'+doors+'</div>'+
    '<div class="card" style="border-color:#FFD54F"><div class="ctitle">'+t('Panama Holiday + Season Alerts')+'</div>'+hols+'</div></div>'+
    '<div class="card" style="margin-top:14px;border-top:4px solid var(--brown)">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">'+
    '<div class="ctitle" style="margin-bottom:0">&#128200; '+t('Budget')+' — '+t('Phases & Timeline')+'</div>'+
    '<div style="font-size:11px;color:var(--tan)">'+t('Budget')+': <strong style="color:var(--rust)">'+pc(grandPaid,grandBudget)+'% paid</strong></div></div>'+
    '<div style="overflow-x:auto"><table>'+
    '<thead><tr style="border-bottom:2px solid var(--border)">'+
    '<th>'+t('Phase / Task')+'</th><th style="text-align:center">'+t('Status')+'</th><th>'+t('Details')+'</th>'+
    '<th style="text-align:right">'+t('Budget')+'</th><th style="text-align:right">'+t('Paid')+'</th><th style="text-align:right">'+t('Balance')+'</th></tr></thead>'+
    '<tbody>'+phRows+'</tbody>'+
    '<tfoot><tr style="border-top:3px solid var(--brown);background:var(--cream)">'+
    '<td colspan="3" style="padding:10px;font-weight:700;font-size:12px;text-transform:uppercase">TOTAL</td>'+
    '<td style="padding:10px;font-family:\'Playfair Display\',serif;font-size:15px;font-weight:700;text-align:right">'+fm(grandBudget)+'</td>'+
    '<td style="padding:10px;font-family:\'Playfair Display\',serif;font-size:15px;font-weight:700;color:#2E7D32;text-align:right">'+fm(grandPaid)+'</td>'+
    '<td style="padding:10px;font-family:\'Playfair Display\',serif;font-size:15px;font-weight:700;color:'+(grandBal>0?'#E65100':'#2E7D32')+';text-align:right">'+fm(grandBal)+'</td>'+
    '</tr></tfoot></table></div></div>';
}

function RPH(){

      '</div></div>';

  }).join('');

  document.getElementById('tab-phases').innerHTML=

    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px">'+phBtns+'</div>'+
    '<div id="phase-detail"></div>';

  selPhase(D.phases[0].id, document.querySelector('[data-id="'+D.phases[0].id+'"]'));

function selPhase(id, btn){
  document.querySelectorAll('.ph-sel-btn').forEach(function(b){
    var ph2=D.phases.find(function(p){return p.id===parseInt(b.getAttribute('data-id'));});
    if(ph2){b.style.background='transparent';b.style.color=ph2.color;}
  });
  if(btn){var ph=D.phases.find(function(p){return p.id===id;});if(ph){btn.style.background=ph.color;btn.style.color='#fff';}}
  var ph=D.phases.find(function(p){return p.id===id;});
  if(!ph)return;
  var tasks=D.tasks.filter(function(tk){return tk.pid===id;});
  var p=pc(ph.paid,ph.budget);
  var taskRows=tasks.map(function(tk){
    var bal=nv(tk.cost)-nv(tk.paid);
    var st=t(tk.status);
    var tc={complete:{bg:'#E8F5E9',fg:'#2E7D32'},completado:{bg:'#E8F5E9',fg:'#2E7D32'},active:{bg:'#FFF3E0',fg:'#E65100'},activo:{bg:'#FFF3E0',fg:'#E65100'},pending:{bg:'#F5F5F5',fg:'#7B6654'},pendiente:{bg:'#F5F5F5',fg:'#7B6654'}}[st]||{bg:'#F5F5F5',fg:'#7B6654'};
    var ico={complete:'✓',completado:'✓',active:'↻',activo:'↻',pending:'⏳',pendiente:'⏳'}[st]||'⏳';
    var tp=tk.status==='complete'?100:tk.status==='pending'?0:(tk.progress||pc(tk.paid,tk.cost));
    return '<tr style="background:'+tc.bg+'22">'+
      '<td style="font-size:13px;width:22px">'+ico+'</td>'+
      '<td>'+tk.name+'</td>'+
      '<td><span class="badge" style="background:'+tc.bg+';color:'+tc.fg+'">'+st+'</span></td>'+
      '<td>'+(tk.who||'--')+'</td>'+
      '<td style="font-weight:600">'+fm(tk.cost)+'</td>'+
      '<td style="color:'+(nv(tk.paid)>0?'#2E7D32':'var(--tan)')+'">'+fm(tk.paid)+'</td>'+
      '<td style="color:'+(bal>0?'#E65100':'#2E7D32')+'">'+fm(bal)+'</td>'+
      '<td style="min-width:90px"><div class="pb" style="height:7px"><div class="pbf" style="width:'+tp+'%;background:'+ph.color+';height:7px"></div></div>'+
      '<div style="font-size:9px;color:var(--tan);margin-top:2px">'+tp+'%</div></td></tr>';
  }).join('');
  document.getElementById('phase-detail').innerHTML=
    '<div class="card" style="border:2px solid '+ph.color+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">'+
    '<div><div style="font-family:\'Playfair Display\',serif;font-size:18px;font-weight:700;color:'+ph.color+'">'+ph.lbl+': '+ph.title+'</div>'+
    '<div style="font-size:11px;color:var(--tan);margin-top:4px">'+t('Budget')+': '+fm(ph.budget)+' &nbsp; '+t('Paid')+': '+fm(ph.paid)+'</div></div>'+
    '<div style="text-align:right"><div style="font-family:\'Playfair Display\',serif;font-size:24px;font-weight:700;color:'+ph.color+'">'+p+'%</div>'+
    '<div style="font-size:10px;color:var(--tan)">complete</div></div></div>'+
    '<div class="pb" style="height:12px;margin-bottom:14px"><div class="pbf" style="width:'+p+'%;background:'+ph.color+';height:12px"></div></div>'+
    '<div style="overflow-x:auto"><table><thead><tr style="border-bottom:2px solid var(--border)">'+
    '<th></th><th>Task</th><th>'+t('Status')+'</th><th>'+t('Contractor')+'</th><th>'+t('Budget')+'</th><th>'+t('Paid')+'</th><th>'+t('Balance')+'</th><th>Progress</th></tr></thead>'+
    '<tbody>'+taskRows+'</tbody></table></div></div>';
}

      '<div style="font-weight:700;font-size:14px">'+c.name+'</div>'+
      '<div style="font-size:11px;color:var(--tan);margin-top:3px">'+c.scope+' — '+c.inv+'</div></div>'+
      '<span class="badge" style="background:'+ss.bg+';color:'+ss.fg+';display:inline-block;margin-bottom:11px">'+t(c.status)+'</span>'+
      '<div class="cgr">'+
      '<div class="cst"><div class="csl">'+t('Contract Total')+'</div><div class="csv">B/.'+nv(c.total).toLocaleString()+'</div></div>'+
      '<div class="cst"><div class="csl">'+t('Paid')+'</div><div class="csv" style="color:#2E7D32">B/.'+nv(c.paid).toLocaleString()+'</div></div>'+
      '<div class="cst"><div class="csl">'+t('Due @ 70%')+'</div><div class="csv" style="color:#E65100">B/.'+nv(c.d70).toLocaleString()+'</div></div>'+
      '<div class="cst"><div class="csl">'+t('Final Payment')+'</div><div class="csv" style="color:var(--rust)">B/.'+nv(c.final).toLocaleString()+'</div></div></div>'+
      '<div class="pb" style="height:9px"><div class="pbf" style="width:'+p+'%;background:'+tc+';height:9px"></div></div>'+
      '<div style="font-size:10px;color:var(--tan);margin-top:6px">'+p+'% paid — '+c.notes+'</div></div>';
  }).join('');
  document.getElementById('tab-contractors').innerHTML='<div class="g3">'+cards+'</div>';
}

function parseFt(s){
  if(!s)return 0;
  var str=String(s).trim();
  var m1=str.match(/^([\d.]+)\s*ft\s*([\d.]+)\s*in/i);if(m1)return parseFloat(m1[1])+(parseFloat(m1[2])/12);
  var m3=str.match(/^([\d.]+)\s*ft/i);if(m3)return parseFloat(m3[1]);
  var m4=str.match(/^[\d.]+$/);if(m4)return parseFloat(m4[0]);
  return 0;
}
function ftToM(ft){return Math.round(ft*0.3048*1000)/1000;}
function fmFt(ft){var w=Math.floor(ft),inches=Math.round((ft-w)*12);if(inches===12){w++;inches=0;}return w+'ft'+(inches>0?' '+inches+'in':'');}
function fmDual(s){var ft=parseFt(s);if(!ft)return s;return fmFt(ft)+' <span style="color:#7B6654;font-size:10px">('+ftToM(ft).toFixed(2)+'m)</span>';}

function RRM(){
  var t2=D.rtotals;
  var SS={Existing:'background:#F5F5F5;color:#616161',Renovation:'background:#FFF8E1;color:#F57F17',Locked:'background:#E3F2FD;color:#01579B',Active:'background:#E0F2F1;color:#00695C',New:'background:#FFF3E0;color:#E65100'};
  var tots=[{l:'House Area',v:t2.house+' ft²',c:'#2C1810'},{l:'Terraza Area',v:t2.terraza+' ft²',c:'var(--rust)'},{l:'Front Porch',v:t2.porch+' ft²',c:'var(--gold)'},{l:'Grand Total',v:t2.grand+' ft²',c:'#00695C'}].map(function(s){
    var ft=parseFloat(s.v)||0;
    var m2=Math.round(ft*0.0929*100)/100;
    return '<div class="sc" style="border-top:4px solid '+s.c+'">'+
      '<div class="sval" style="color:'+s.c+'">'+s.v+'</div>'+
      '<div style="font-size:10px;color:#7B6654;margin-top:1px">'+(ft?'≈ '+m2+' m²':'')+'</div>'+
      '<div class="slbl">'+s.l+'</div></div>';
  }).join('');
  var rows=D.rooms.map(function(r){
    var ss2=SS[r.status]||SS.Existing;
    return '<tr>'+
      '<td><span style="color:var(--tan);font-size:10px;font-weight:600">'+r.zone+'</span></td>'+
      '<td><span style="font-weight:'+(r.status==='New'?'700':'400')+';color:'+(r.status==='New'?'var(--rust)':'var(--brown)')+'">'+r.name+'</span></td>'+
      '<td>'+fmDual(r.depth)+'</td>'+
      '<td>'+fmDual(r.width)+'</td>'+
      '<td><strong>'+r.sqft+'</strong> <span style="font-weight:400;font-size:10px;color:#7B6654">('+Math.round(parseFloat(r.sqft||0)*0.0929*100)/100+' m²)</span></td>'+
      '<td><span class="badge" style="'+ss2+'">'+r.status+'</span></td></tr>';
  }).join('');
  document.getElementById('tab-rooms').innerHTML=
    '<div class="galert">Dimensions shown in US Customary (ft) with metric equivalent (m).</div>'+
    '<div class="gst" style="grid-template-columns:repeat(auto-fill,minmax(145px,1fr))">'+tots+'</div>'+
    '<div class="card"><div class="ctitle">All Spaces — Floor Plan v15</div>'+
    '<div style="overflow-x:auto"><table><thead class="thd"><tr>'+
    '<th>Zone</th><th>Room / Space</th><th>Depth F-R (ft / m)</th><th>Width N-S (ft / m)</th><th>Sq Ft (m²)</th><th>Status</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div></div>'+
    '<div style="background:#E3F2FD;border:1px solid #90CAF9;border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.6;margin-top:4px">'+D.tnote+'</div>';
}

function RNS(){
  var sections=D.nextsteps.map(function(cat){
    var items=cat.items.map(function(ns){
      return '<div class="nsc" style="border-left:5px solid '+cat.border+'">'+
        '<div style="font-size:10px;font-weight:700;color:'+cat.color+';margin-bottom:5px">'+ns.timing+'</div>'+
        '<div style="font-weight:700;font-size:13px;margin-bottom:4px">'+ns.title+'</div>'+
        '<div style="font-size:11px;color:var(--tan);line-height:1.5">'+ns.desc+'</div></div>';
    }).join('');
    return '<div class="card" style="border-top:4px solid '+cat.border+';margin-bottom:16px">'+
      '<div class="ctitle" style="color:'+cat.color+'">'+cat.cat+'</div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px">'+items+'</div></div>';
  }).join('');
  var cpLines=D.cp.split('\n').map(function(l){return l?'<div style="margin-bottom:3px">'+l+'</div>':'';}).join('');
  document.getElementById('tab-nextsteps').innerHTML=
    sections+
    '<div class="ralert">'+
    '<div style="font-family:\'Playfair Display\',serif;font-size:15px;font-weight:700;color:var(--rust);margin-bottom:10px">CRITICAL PATH — Azuero Peninsula, Panama</div>'+
    cpLines+'</div>';
}

function RA(){
  document.getElementById('hTitle').textContent=D.header.title;
  document.getElementById('hSub').textContent=D.header.sub;
  document.getElementById('hLabel').textContent=D.header.label;
  document.getElementById('fL').textContent=D.footer.left;
  document.getElementById('fR').textContent=D.footer.right;
  document.getElementById('lastUpdated').textContent='Updated: 2026-03-26';

  var bw=document.getElementById('bw');bw.innerHTML='';
  D.badges.forEach(function(b){
    if(!b.l&&!b.v)return;
    var p=document.createElement('div');p.className='pill';
    p.innerHTML='<div class="pill-lbl">'+b.l+'</div><div class="pill-val">'+b.v+'</div>';
    bw.appendChild(p);
  });

  RO();RBD();RCO();RRM();RNS();RPH();
}

window.addEventListener('DOMContentLoaded',function(){RA();});
</script>
</body>
</html>
