<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Casa La Palma — Project Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--rust:#B85042;--dark:#1A0A05;--gold:#C9974A;--cream:#F8F3EC;--brown:#2C1810;--tan:#7B6654;--border:#E8D5B0;--green:#2E7D32}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Source Sans 3",sans-serif;background:var(--cream);color:var(--brown);min-height:100vh}
.header{background:linear-gradient(135deg,#1A0A05 0%,#8B2500 55%,#B85042 100%);padding:22px 30px 18px}
.htop{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.hlbl{font-size:10px;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;margin-bottom:4px}
.htitle{font-family:"Playfair Display",serif;font-size:28px;font-weight:900;color:#fff}
.hsub{color:#D0B896;font-size:12px;margin-top:4px}
.bwrap{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{background:rgba(255,255,255,.1);border-radius:8px;padding:7px 13px;text-align:center}
.pill-lbl{font-size:9px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase}
.pill-val{font-size:12px;color:#fff;font-weight:700}
.lang-bar{background:#111;padding:7px 30px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.lang-btn{border:2px solid;padding:5px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;font-family:"Source Sans 3",sans-serif;transition:all .2s}
.lang-btn.en-active{background:var(--gold);color:#fff;border-color:var(--gold)}
.lang-btn.es-active{background:#1565C0;color:#fff;border-color:#1565C0}
.lang-btn.en-off{background:transparent;color:var(--gold);border-color:var(--gold)}
.lang-btn.es-off{background:transparent;color:#90CAF9;border-color:#90CAF9}
.ro-badge{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:20px;padding:3px 12px;font-size:10px;color:#1B5E20;font-weight:700}
.translating{background:#E3F2FD;border:1px solid #90CAF9;border-radius:6px;padding:8px 16px;font-size:11px;color:#01579B;margin:8px 26px;display:none;align-items:center;gap:8px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #90CAF9;border-top-color:#1565C0;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{background:var(--dark);display:flex;overflow-x:auto;border-bottom:3px solid var(--rust)}
.tabs::-webkit-scrollbar{height:3px}.tabs::-webkit-scrollbar-thumb{background:var(--rust)}
.tab-btn{padding:12px 18px;background:transparent;color:var(--tan);border:none;border-bottom:3px solid transparent;font-family:"Source Sans 3",sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-3px;text-transform:uppercase;letter-spacing:.05em}
.tab-btn.active{background:var(--rust);color:#fff;border-bottom:3px solid var(--gold)}
.tab-btn:hover:not(.active){color:var(--gold)}
.main{padding:22px 26px;max-width:1300px;margin:0 auto}
.tc{display:none}.tc.active{display:block}
.card{background:#fff;border-radius:12px;padding:22px;border:1px solid var(--border);margin-bottom:16px;position:relative}
.ctitle{font-family:"Playfair Display",serif;font-size:15px;font-weight:700;color:var(--brown);margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.gst{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:18px}
.sc{background:#fff;border-radius:10px;padding:15px;border:1px solid var(--border)}
.sval{font-family:"Playfair Display",serif;font-size:21px;font-weight:700}
.slbl{font-size:10px;color:var(--tan);margin-top:3px;text-transform:uppercase;letter-spacing:.07em}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 11px;text-align:left;font-size:10px;color:var(--tan);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border)}
td{padding:8px 11px;border-bottom:1px solid var(--border)}
tr:hover td{background:#FFFDF8}
.thd th{background:var(--brown);color:#E8D5B0;border:none}
.badge{display:inline-block;border-radius:99px;padding:2px 9px;font-size:10px;font-weight:700}
.aalert{background:#FFF8E1;border:1px solid #FFD54F;border-radius:7px;padding:10px 14px;font-size:11px;color:#5D3A00;margin:8px 0}
.ralert{background:#FFEBEE;border:2px solid var(--rust);border-radius:10px;padding:18px;font-size:12px;color:var(--brown);line-height:1.9}
.galert{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:8px;padding:9px 15px;font-size:11px;color:#1B5E20;margin-bottom:14px}
.pb{background:#EEE;border-radius:99px;overflow:hidden}
.pbf{border-radius:99px;transition:width .4s}
.wfr{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.wfl{font-size:12px;flex:0 0 200px;padding:3px 5px}
.wfb{flex:1;background:#EEE;border-radius:99px;height:9px;overflow:hidden}
.wfbf{height:9px;border-radius:99px}
.wfv{font-family:"Playfair Display",serif;font-size:13px;font-weight:700;flex:0 0 90px;text-align:right}
.gw{overflow-x:auto;padding-bottom:6px}
.pbtns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px}
.pbtn{padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:"Source Sans 3",sans-serif;border:2px solid}
.ccard{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--border)}
.cgr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:11px 0}
.cst{background:var(--cream);border-radius:7px;padding:9px 11px}
.csl{font-size:9px;color:var(--tan);text-transform:uppercase;letter-spacing:.05em}
.csv{font-family:"Playfair Display",serif;font-size:14px;font-weight:700;margin-top:2px}
.nsc{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:10px}
.footer{background:var(--dark);padding:11px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-top:24px}
.phase-edit-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px dashed #eee;font-size:11px}
@media(max-width:700px){.g2{grid-template-columns:1fr}.main{padding:14px 15px}.wfl{flex:0 0 120px;font-size:11px}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--rust);border-radius:3px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="htop">
    <div>
      <div class="hlbl" id="hLabel">RC2 Consulting — Project Management Dashboard</div>
      <h1 class="htitle" id="hTitle">Casa La Palma</h1>
      <div class="hsub" id="hSub">La Palma, Provincia de Los Santos, Panama — Renovación 2026</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <div class="bwrap" id="bw"></div>
    </div>
  </div>
</div>

<!-- LANGUAGE + READ-ONLY BAR -->
<div class="lang-bar">
  <button id="btn-en" class="lang-btn en-active" onclick="setLang('en')">🇺🇸 ENGLISH</button>
  <button id="btn-es" class="lang-btn es-off" onclick="setLang('es')">🇵🇦 ESPAÑOL</button>
  <span class="ro-badge" id="ro-badge">👁 VIEW ONLY</span>
  <span style="font-size:10px;color:#555;margin-left:auto" id="last-updated"></span>
</div>
<div class="translating" id="translating-bar">
  <div class="spin"></div>
  <span id="trans-msg">Traduciendo al español con IA...</span>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="ST('overview',this)" data-en="Overview" data-es="Resumen">Overview</button>
  <button class="tab-btn" onclick="ST('phases',this)" data-en="Phases &amp; Timeline" data-es="Fases y Cronograma">Phases &amp; Timeline</button>
  <button class="tab-btn" onclick="ST('budget',this)" data-en="Budget" data-es="Presupuesto">Budget</button>
  <button class="tab-btn" onclick="ST('contractors',this)" data-en="Contractors" data-es="Contratistas">Contractors</button>
  <button class="tab-btn" onclick="ST('rooms',this)" data-en="Dimensions" data-es="Dimensiones">Dimensions</button>
  <button class="tab-btn" onclick="ST('nextsteps',this)" data-en="Next Steps" data-es="Próximos Pasos">Next Steps</button>
</div>

<div class="main">
  <div id="tab-overview" class="tc active"></div>
  <div id="tab-phases" class="tc"></div>
  <div id="tab-budget" class="tc"></div>
  <div id="tab-contractors" class="tc"></div>
  <div id="tab-rooms" class="tc"></div>
  <div id="tab-nextsteps" class="tc"></div>
</div>

<div class="footer">
  <span style="color:var(--tan);font-size:10px" id="fL">RC2 Consulting · Casa La Palma · v15 FINAL · 2026</span>

var SPH=3;
function nv(v){return parseFloat(String(v||0).replace(/[^0-9.-]/g,''))||0;}
function fm(v){return 'B/. '+nv(v).toLocaleString();}
function pc(p,t){return t>0?Math.min(100,Math.round(nv(p)/nv(t)*100)):0;}
function u(k){return UI[LANG][k]||UI.en[k]||k;}
function MONTHS(){return LANG==='es'?MONTHS_ES:MONTHS_EN;}

function ST(id,btn){
  document.querySelectorAll('.tc').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active');});
  document.getElementById('tab-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
}

function setLang(lang){
  LANG=lang;
  var enBtn=document.getElementById('btn-en');
  var esBtn=document.getElementById('btn-es');
  enBtn.className='lang-btn '+(lang==='en'?'en-active':'en-off');
  esBtn.className='lang-btn '+(lang==='es'?'es-active':'es-off');
  document.getElementById('ro-badge').textContent=u('roLabel');
  // Update tab labels
  document.querySelectorAll('.tab-btn').forEach(function(b){
    var t=b.getAttribute('data-'+lang);
    if(t)b.innerHTML=t;
  });
  RA();
}

      '<td><span class="badge" style="background:'+mc.bg+';color:'+mc.fg+'">'+mStatusLabel[m.status]+'</span></td></tr>';

  var wfLabels=LANG==='es'?D.wfLabels_es:D.wfLabels;

      '<div style="font-size:11px;color:var(--tan);line-height:1.5;margin-top:2px">'+desc+'</div></div></div>';
  }).join('');

  var hols=D.holidays.map(function(h){
    var title=LANG==='es'?(h.title_es||h.title):h.title;
    var desc=LANG==='es'?(h.desc_es||h.desc):h.desc;

      '<span style="font-size:18px;flex-shrink:0">'+h.icon+'</span>' +

/* ── PHASES ───────────────────────────────────────── */
function RPH(){
  var MN=MONTHS();
  var ganttHTML='<div style="position:relative;padding-bottom:24px">';
  ganttHTML+='<div style="display:flex;margin-left:145px;margin-bottom:2px">';
  MN.forEach(function(m){
    ganttHTML+='<div style="flex:1;text-align:center;font-size:10px;color:var(--tan);font-weight:600;padding-bottom:5px;border-bottom:1px solid var(--border)">'+m+'</div>';
  });
  ganttHTML+='</div>';
  ganttHTML+='<div style="position:relative;margin-top:4px">';
  ganttHTML+='<div style="position:absolute;top:0;left:145px;right:0;bottom:0;display:flex;pointer-events:none">';
  MN.forEach(function(m,mi){
    ganttHTML+='<div style="flex:1;border-right:'+(mi<11?'1px solid #f0eeea':'none')+'"></div>';
  });
  ganttHTML+='</div>';
  ganttHTML+='<div style="position:absolute;top:0;bottom:0;left:calc(145px + '+(2/12*100).toFixed(4)+'%);width:2px;background:var(--rust);z-index:6;pointer-events:none">' +
    '<span style="position:absolute;bottom:-20px;left:-14px;font-size:10px;color:var(--rust);font-weight:700;white-space:nowrap">'+(LANG==='es'?'HOY':'TODAY')+'</span></div>';

  D.phases.forEach(function(ph){
    var isSel=ph.id===SPH;
    var lbl=LANG==='es'?(ph.lbl_es||ph.lbl):ph.lbl;
    var title=LANG==='es'?(ph.title_es||ph.title):ph.title;
    var leftPct=(nv(ph.start)/12*100).toFixed(4);
    var widPct=(nv(ph.dur)/12*100).toFixed(4);
    ganttHTML+='<div style="display:flex;align-items:center;min-height:38px;border-bottom:1px solid #f5f3f0;cursor:pointer" onclick="SPsel('+ph.id+')">';
    ganttHTML+='<div style="width:145px;flex-shrink:0;padding-right:8px">' +
      '<div style="font-size:10px;font-weight:'+(isSel?'700':'400')+';color:'+(isSel?ph.color:'var(--tan)')+'">'+lbl+'</div>' +
      '<div style="font-size:9px;color:var(--tan)">'+title+'</div></div>';
    ganttHTML+='<div style="flex:1;position:relative;height:38px;display:flex;align-items:center">';
    ganttHTML+='<div style="position:absolute;left:'+leftPct+'%;width:'+widPct+'%;height:26px;background:'+ph.color+';border-radius:4px;box-shadow:0 1px 5px rgba(0,0,0,.2);'+(isSel?'outline:2px solid var(--gold);outline-offset:1px;':'')+'cursor:pointer" title="'+lbl+': '+title+'"></div>';
    ganttHTML+='</div></div>';
  });
  ganttHTML+='</div></div>';

  var phBtns=D.phases.map(function(ph){
    var isSel=ph.id===SPH;
    var lbl=LANG==='es'?(ph.lbl_es||ph.lbl):ph.lbl;
    var title=LANG==='es'?(ph.title_es||ph.title):ph.title;
    return '<button class="pbtn" style="border-color:'+ph.color+';background:'+(isSel?ph.color:'transparent')+';color:'+(isSel?'#fff':ph.color)+'" onclick="SPsel('+ph.id+')">'+lbl+': '+title+'</button>';
  }).join('');

  var ph=D.phases.find(function(p){return p.id===SPH;})||D.phases[0];
  var p=pc(ph.paid,ph.budget);
  var tasks=D.tasks.filter(function(t){return t.pid===SPH;});
  var phLbl=LANG==='es'?(ph.lbl_es||ph.lbl):ph.lbl;
  var phTitle=LANG==='es'?(ph.title_es||ph.title):ph.title;
  var phWarn=LANG==='es'?(ph.warn_es||ph.warn):ph.warn;

  var taskRows=tasks.map(function(t){
    var tp=t.status==='complete'?100:t.status==='pending'?0:(t.progress!=null?t.progress:pc(t.paid,t.cost));
    var sBg={pending:'#F5F5F5',active:'#FFF3E0',complete:'#E8F5E9'}[t.status]||'#F5F5F5';
    var sFg={pending:'#7B6654',active:'#E65100',complete:'#2E7D32'}[t.status]||'#7B6654';
    var ico={pending:'⌛',active:'↻',complete:'✓'}[t.status]||'⌛';
    var sLabel={pending:u('statusPending'),active:u('statusActive'),complete:u('statusDone')}[t.status]||t.status;
    var tname=LANG==='es'?(t.name_es||t.name):t.name;
    var bal=nv(t.cost)-nv(t.paid);
    return '<tr style="background:'+sBg+'22">' +
      '<td style="font-size:13px;width:22px">'+ico+'</td>' +
      '<td>'+tname+'</td>' +
      '<td><span class="badge" style="background:'+sBg+';color:'+sFg+'">'+sLabel+'</span></td>' +
      '<td>'+(t.who||'--')+'</td>' +
      '<td style="font-weight:600">'+fm(t.cost)+'</td>' +
      '<td style="color:'+(nv(t.paid)>0?'#2E7D32':'var(--tan)')+'">'+fm(t.paid)+'</td>' +
      '<td style="color:'+(bal>0?'#E65100':'#2E7D32')+'">'+fm(bal)+'</td>' +
      '<td style="min-width:90px"><div class="pb" style="height:7px"><div class="pbf" style="width:'+tp+'%;background:'+(t.status==='complete'?'#2E7D32':ph.color)+';height:7px"></div></div>' +
      '<div style="font-size:9px;color:'+(t.status==='complete'?'#2E7D32':'var(--tan)')+';margin-top:2px">'+tp+'%'+(t.status==='complete'?' ✓':'')+'</div></td></tr>';
  }).join('');

  document.getElementById('tab-phases').innerHTML=
    '<div class="card">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">' +
    '<div class="ctitle" style="margin-bottom:0">'+u('fullTimeline')+'</div></div>' +
    '<div class="gw" style="overflow-x:auto;min-height:60px">'+ganttHTML+'</div></div>' +
    '<div class="pbtns">'+phBtns+'</div>' +
    '<div class="card" id="phase-detail" style="border:2px solid '+ph.color+'">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">' +
    '<div><div style="font-family:\'Playfair Display\',serif;font-size:18px;font-weight:700;color:'+ph.color+'">'+phLbl+': '+phTitle+'</div>' +
    '<div style="font-size:11px;color:var(--tan);margin-top:4px">'+u('budgetCol')+': '+fm(ph.budget)+' &nbsp; '+u('paidCol')+': '+fm(ph.paid)+' &nbsp; '+u('balanceCol')+': '+fm(nv(ph.budget)-nv(ph.paid))+'</div></div>' +
    '<div style="text-align:right"><div style="font-family:\'Playfair Display\',serif;font-size:24px;font-weight:700;color:'+ph.color+'">'+p+'%</div><div style="font-size:10px;color:var(--tan)">'+u('complete')+'</div></div></div>' +
    '<div class="pb" style="height:12px;margin-bottom:14px"><div class="pbf" style="width:'+p+'%;background:'+ph.color+';height:12px"></div></div>' +
    (phWarn?'<div class="aalert">'+phWarn+'</div>':'')+
    '<div style="overflow-x:auto"><table><thead><tr style="border-bottom:2px solid var(--border)">' +
    '<th></th><th>'+u('taskCol')+'</th><th>'+u('statusCol')+'</th><th>'+u('contractorCol')+'</th><th>'+u('budgetCol')+'</th><th>'+u('paidCol')+'</th><th>'+u('balanceCol')+'</th><th>'+u('progressCol')+'</th></tr></thead>' +
    '<tbody>'+taskRows+'</tbody></table></div></div>';
}
function SPsel(id){SPH=id;RPH();setTimeout(function(){var d=document.getElementById('phase-detail');if(d)d.scrollIntoView({behavior:'smooth',block:'start'});},60);}

/* ── BUDGET ───────────────────────────────────────── */
function RBD(){
  var cfg=D.cfg,total=nv(cfg.TotalBudget)||60000;
  var phT=D.phases.reduce(function(s,p){return s+nv(p.budget);},0);
  var over=phT-total;
  var wfLabels=LANG==='es'?D.wfLabels_es:D.wfLabels;
  var wfRows=D.wfKeys.map(function(k,i){
    var l=wfLabels[i],c=D.wfColors[i],v=nv(cfg[k]),p=Math.round(v/total*100);
    var s=i===0?'':'-';
    return '<div class="wfr"><div class="wfl">'+l+'</div>' +
      '<div class="wfb"><div class="wfbf" style="width:'+Math.min(p,100)+'%;background:'+c+'"></div></div>' +
      '<div class="wfv" style="color:'+c+'">'+s+'B/.'+v.toLocaleString()+'</div></div>';
  }).join('');

  var mx=D.phases.reduce(function(m,p){return Math.max(m,nv(p.budget));},1);
  var svgH=D.phases.length*52+30;
  var svg='<svg width="100%" viewBox="0 0 480 '+svgH+'" style="font-family:\'Source Sans 3\',sans-serif">';
  D.phases.forEach(function(ph,i){
    var y=i*52+18,bw=Math.round(nv(ph.budget)/mx*300),pw=Math.round(nv(ph.paid)/mx*300);
    var lbl=LANG==='es'?(ph.lbl_es||ph.lbl):ph.lbl;
    svg+='<text x="0" y="'+(y+15)+'" font-size="11" fill="#2C1810" font-weight="700">'+lbl+'</text>';
    svg+='<rect x="68" y="'+y+'" width="'+bw+'" height="20" rx="3" fill="#E8D5B0"/>';
    svg+='<text x="'+(68+bw+4)+'" y="'+(y+14)+'" font-size="10" fill="#7B6654">'+fm(ph.budget)+'</text>';
    if(nv(ph.paid)>0){svg+='<rect x="68" y="'+(y+22)+'" width="'+pw+'" height="14" rx="3" fill="'+ph.color+'" opacity="0.85"/>';}
  });
  svg+='</svg>';

  var notes=D.regNotes.map(function(r){
    var t=LANG==='es'?(r.title_es||r.title):r.title;
    var d=LANG==='es'?(r.desc_es||r.desc):r.desc;
    return '<div style="background:var(--cream);border-radius:8px;padding:11px 14px">' +
      '<div style="font-weight:700;font-size:11px;color:var(--rust);margin-bottom:3px">'+t+'</div>' +
      '<div style="font-size:11px;line-height:1.5">'+d+'</div></div>';
  }).join('');

  document.getElementById('tab-budget').innerHTML=
    '<div class="g2">' +
    '<div class="card"><div class="ctitle">'+u('budgetWaterfall')+'</div>' +
    wfRows +
    '<div style="border-top:2px solid #2E7D32;padding-top:12px;margin-top:8px;display:flex;justify-content:space-between;align-items:center">' +
    '<div style="font-weight:700;font-size:13px">'+u('netConstruction')+'</div>' +
    '<div style="font-family:\'Playfair Display\',serif;font-size:23px;font-weight:700;color:#2E7D32">B/. '+nv(cfg.NetConstruction).toLocaleString()+'</div></div></div>' +
    '<div class="card"><div class="ctitle">'+u('phaseBudget')+'</div>' +
    '<div style="padding:6px 0">'+svg+'</div>' +
    '<div style="font-size:11px;color:'+(over>0?'#C62828':'#2E7D32')+';text-align:center;margin-top:8px;font-weight:600">' +
    (over>0?u('exceedsBudget')+over.toLocaleString():u('withinBudget'))+'</div></div></div>' +
    '<div class="card"><div class="ctitle">'+u('regNotes')+'</div>' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px">'+notes+'</div></div>';
}

/* ── CONTRACTORS ──────────────────────────────────── */
function RCO(){
  var cards=D.contractors.map(function(c){
    var tot=nv(c.total),pd=nv(c.paid),p=pc(pd,tot);
    var ss={PAID:{bg:'#C8E6C9',fg:'#2E7D32'},ACTIVE:{bg:'#FFF3E0',fg:'#E65100'},PENDING:{bg:'#F5F5F5',fg:'#7B6654'}}[c.status]||{bg:'#F5F5F5',fg:'#7B6654'};
    var tc=c.status==='PAID'?'#2E7D32':'var(--rust)';
    var sLabel={PAID:u('statusPaid'),ACTIVE:u('statusActiveCo'),PENDING:u('statusPendingCo')}[c.status]||c.status;
    var scope=LANG==='es'?(c.scope_es||c.scope):c.scope;
    var notes=LANG==='es'?(c.notes_es||c.notes):c.notes;
    var sup=c.inv==='--';
    if(sup){
      return '<div class="ccard" style="border-top:4px solid var(--gold)">' +
        '<div style="font-weight:700;font-size:14px;margin-bottom:3px">'+c.name+'</div>' +
        '<div style="font-size:11px;color:var(--tan);margin-bottom:11px">'+scope+'</div>' +
        '<div class="cgr"><div class="cst"><div class="csl">'+u('paidDate')+'</div><div class="csv" style="color:#2E7D32">$'+nv(c.paid).toLocaleString()+'</div></div>' +
        '<div class="cst"><div class="csl">'+u('finalPay')+'</div><div class="csv" style="color:#E65100">$'+nv(c.final).toLocaleString()+'</div></div></div>' +
        '<div style="font-size:11px;color:var(--tan)">'+notes+'</div></div>';
    }
    return '<div class="ccard" style="border-top:4px solid '+tc+'">' +
      '<div style="margin-bottom:11px"><div style="font-weight:700;font-size:14px">'+c.name+'</div>' +
      '<div style="font-size:11px;color:var(--tan);margin-top:3px">'+scope+' — '+c.inv+'</div></div>' +
      '<span class="badge" style="background:'+ss.bg+';color:'+ss.fg+';display:inline-block;margin-bottom:11px">'+sLabel+'</span>' +
      '<div class="cgr">' +
      '<div class="cst"><div class="csl">'+u('contractTotal')+'</div><div class="csv">B/.'+nv(c.total).toLocaleString()+'</div></div>' +
      '<div class="cst"><div class="csl">'+u('paidDate')+'</div><div class="csv" style="color:#2E7D32">B/.'+nv(c.paid).toLocaleString()+'</div></div>' +
      '<div class="cst"><div class="csl">'+u('due70')+'</div><div class="csv" style="color:#E65100">B/.'+nv(c.d70).toLocaleString()+'</div></div>' +
      '<div class="cst"><div class="csl">'+u('finalPay')+'</div><div class="csv" style="color:var(--rust)">B/.'+nv(c.final).toLocaleString()+'</div></div></div>' +
      '<div class="pb" style="height:9px"><div class="pbf" style="width:'+p+'%;background:'+tc+';height:9px"></div></div>' +
      '<div style="font-size:10px;color:var(--tan);margin-top:6px">'+p+'% '+u('paidCol').toLowerCase()+' — '+notes+'</div></div>';
  }).join('');

  document.getElementById('tab-contractors').innerHTML=
    '<div class="g3">'+cards+'</div>';
}

      '<td style="color:var(--tan);font-size:10px;font-weight:600">'+zone+'</td>' +

      '<td><span class="badge" style="'+ss2+'">'+statusLabel+'</span></td></tr>';

  var tnote=LANG==='es'?(D.tnote_es||D.tnote):D.tnote;

    '<th>'+u('zone')+'</th><th>'+u('room')+'</th><th>'+u('depth')+'</th><th>'+u('width')+'</th><th>'+u('sqft')+'</th><th>'+u('statusH')+'</th>' +
    '</tr></thead><tbody>'+rows+'</tbody></table></div></div>' +
    '<div style="background:#E3F2FD;border:1px solid #90CAF9;border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.6;margin-top:4px">'+tnote+'</div>';
}

/* ── NEXT STEPS ───────────────────────────────────── */
function RNS(){
  var sections=D.nextsteps.map(function(cat){
    var catName=LANG==='es'?(cat.cat_es||cat.cat):cat.cat;
    var items=cat.items.map(function(ns){
      var title=LANG==='es'?(ns.title_es||ns.title):ns.title;
      var desc=LANG==='es'?(ns.desc_es||ns.desc):ns.desc;
      var timing=LANG==='es'?(ns.timing_es||ns.timing):ns.timing;
      return '<div class="nsc" style="border-left:5px solid '+cat.border+'">' +
        '<div style="font-size:10px;font-weight:700;color:'+cat.color+';margin-bottom:8px">'+timing+'</div>' +
        '<div style="font-weight:700;font-size:13px;margin-bottom:4px">'+title+'</div>' +
        '<div style="font-size:11px;color:var(--tan);line-height:1.5">'+desc+'</div></div>';
    }).join('');
    return '<div class="card" style="border-top:4px solid '+cat.border+';margin-bottom:16px">' +
      '<div class="ctitle" style="color:'+cat.color+'">'+catName+'</div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px">'+items+'</div></div>';
  }).join('');

  var cp=LANG==='es'?(D.cp_es||D.cp):D.cp;
  var cpLines=cp.split('\n').map(function(l){return l?'<div style="margin-bottom:3px">'+l+'</div>':'';}).join('');

  document.getElementById('tab-nextsteps').innerHTML=
    sections +
    '<div class="ralert">' +
    '<div style="font-family:\'Playfair Display\',serif;font-size:15px;font-weight:700;color:var(--rust);margin-bottom:10px">'+u('criticalPath')+'</div>' +
    cpLines+'</div>';
}
