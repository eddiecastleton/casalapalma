name: Sync Casa La Palma Dashboard

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Download JSON from Google Drive
        run: |
          python3 download_json.py

      - name: Inject data into dashboard
        run: |
          python3 inject_data.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "casalapalma-bot@rc2consulting.com"
          git config --local user.name "Casa La Palma Auto-Sync"
          git diff --quiet index.html || (git add index.html && git commit -m "Auto-sync dashboard $(date +'%Y-%m-%d %H:%M UTC')" && git push)
